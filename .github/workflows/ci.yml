name: CI - Data Platform Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Code Quality (Linting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Linting Tools
        run: |
          pip install ruff sqlfluff sqlfluff-templater-dbt dbt-postgres
          
      - name: Python Lint (Ruff)
        run: ruff check .
        
      - name: SQL Lint (SQLFluff)
        run: sqlfluff lint dbt/models --dialect postgres

  test-pipeline:
    name: Functional Pipeline Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Environment
        run: |
          cp .env.example .env
          # Use CI specific overrides if needed
          sed -i 's/POSTGRES_HOST=localhost/POSTGRES_HOST=postgres/g' .env

      - name: Run Ephemeral Infrastructure
        run: docker compose up -d postgres
        
      - name: Set up Python & Install Deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Full Pipeline (Dry Run)
        run: |
          # Wait for Postgres to be healthy
          timeout 60s bash -c "until docker exec olist_postgres pg_isready -U admin -d olist; do sleep 2; done"
          python -m pipeline.run_pipeline
          
      - name: dbt Test (Data Quality)
        run: |
          cd dbt
          dbt test --profiles-dir ..

      - name: Cleanup
        if: always()
        run: docker compose down -v
