name: CI - Data Platform Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Code Quality (Linting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Linting & Dev Tools
        run: |
          pip install -e .[dev]
          
      - name: Python Lint (Ruff)
        run: ruff check .
        
      - name: SQL Lint (SQLFluff)
        run: sqlfluff lint dbt/models --dialect postgres

      - name: Run Unit Tests & Check Coverage
        run: |
          pip install -e .[dev]
          pytest

  test-pipeline:
    name: Functional Pipeline Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Environment
        run: |
          cp .env.example .env
          # Create data directory structure
          mkdir -p data/landing data/bronze data/silver data/gold metadata
          # Create tiny sample files for testing
          # orders
          echo "order_id,customer_id,order_status,order_purchase_timestamp,order_approved_at,order_delivered_carrier_date,order_delivered_customer_date,order_estimated_delivery_date" > data/landing/olist_orders_dataset.csv
          echo "1,1,delivered,2023-01-01 10:00:00,2023-01-01 11:00:00,2023-01-02 10:00:00,2023-01-03 10:00:00,2023-01-10 10:00:00" >> data/landing/olist_orders_dataset.csv
          
          # customers
          echo "customer_id,customer_unique_id,customer_zip_code_prefix,customer_city,customer_state" > data/landing/olist_customers_dataset.csv
          echo "1,uuid1,12345,city,SP" >> data/landing/olist_customers_dataset.csv

          # order_items
          echo "order_id,order_item_id,product_id,seller_id,shipping_limit_date,price,freight_value" > data/landing/olist_order_items_dataset.csv
          echo "1,1,1,1,2023-01-02 10:00:00,100,10" >> data/landing/olist_order_items_dataset.csv

          # order_payments
          echo "order_id,payment_sequential,payment_type,payment_installments,payment_value" > data/landing/olist_order_payments_dataset.csv
          echo "1,1,credit_card,1,110" >> data/landing/olist_order_payments_dataset.csv
          
          # Create dbt profile for CI
          echo "olist:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                user: admin
                password: admin123
                port: 5432
                dbname: olist
                schema: public" > dbt/profiles.yml

      - name: Run Ephemeral Infrastructure
        run: docker compose up -d postgres
        
      - name: Set up Python & Install Deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Project & Dependencies
        run: |
          pip install .
          
      - name: Run Full Pipeline (Dry Run)
        run: |
          # Wait for Postgres to be healthy
          timeout 60s bash -c "until docker exec olist_postgres pg_isready -U admin -d olist; do sleep 2; done"
          python -m pipeline.run_pipeline
          
      - name: dbt Test (Data Quality)
        run: |
          cd dbt
          dbt test --profiles-dir .

      - name: Cleanup
        if: always()
        run: docker compose down -v
