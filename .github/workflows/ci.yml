name: CI - Data Platform Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Code Quality (Linting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Linting Tools
        run: |
          pip install ruff sqlfluff sqlfluff-templater-dbt dbt-postgres
          
      - name: Python Lint (Ruff)
        run: ruff check .
        
      - name: SQL Lint (SQLFluff)
        run: sqlfluff lint dbt/models --dialect postgres

  test-pipeline:
    name: Functional Pipeline Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Environment
        run: |
          cp .env.example .env
          # Create data directory structure
          mkdir -p data/landing data/bronze data/silver data/gold metadata
          # Create a tiny sample file for testing
          echo "order_id,customer_id,order_status,order_purchase_timestamp,order_approved_at,order_delivered_carrier_date,order_delivered_customer_date,order_estimated_delivery_date" > data/landing/olist_orders_dataset.csv
          echo "1,1,delivered,2023-01-01 10:00:00,2023-01-01 11:00:00,2023-01-02 10:00:00,2023-01-03 10:00:00,2023-01-10 10:00:00" >> data/landing/olist_orders_dataset.csv
          
          # Create dbt profile for CI
          echo "olist:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                user: admin
                password: admin123
                port: 5432
                dbname: olist
                schema: public" > profiles.yml

      - name: Run Ephemeral Infrastructure
        run: docker compose up -d postgres
        
      - name: Set up Python & Install Deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Full Pipeline (Dry Run)
        run: |
          # Wait for Postgres to be healthy
          timeout 60s bash -c "until docker exec olist_postgres pg_isready -U admin -d olist; do sleep 2; done"
          python -m pipeline.run_pipeline
          
      - name: dbt Test (Data Quality)
        run: |
          cd dbt
          dbt test --profiles-dir ..

      - name: Cleanup
        if: always()
        run: docker compose down -v
