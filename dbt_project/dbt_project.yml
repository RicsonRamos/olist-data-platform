name: 'olist_dbt'
version: '1.0.0'
config-version: 2

profile: 'olist'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  olist_dbt:
    staging:
      +materialized: table
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
    consumption:
      +materialized: table
      +schema: consumption
